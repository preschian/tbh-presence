name: Build and release

# Builds both editions (TbhCompanion.exe + TbhCompanion-Presence.exe) and attaches them to a GitHub Release.
# Trigger by pushing a version tag, e.g.:
#     git tag v1.0.0 && git push origin v1.0.0
# Or run manually from the Actions tab (produces a build artifact, no release).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build both editions
        shell: pwsh
        run: |
          # version from the tag (refs/tags/v1.2.3 -> 1.2.3); dev fallback otherwise
          $ver = if ($env:GITHUB_REF -like 'refs/tags/*') { ($env:GITHUB_REF -replace '^refs/tags/v?', '') } else { '0.0.0' }
          .\build.ps1 -Version $ver
          Get-Item TbhCompanion.exe, TbhCompanion-Presence.exe | Select-Object Name, Length, VersionInfo

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: TbhCompanion
          path: |
            TbhCompanion.exe
            TbhCompanion-Presence.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            TbhCompanion.exe
            TbhCompanion-Presence.exe
          generate_release_notes: true
